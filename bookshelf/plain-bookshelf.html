---
layout: default
title: Plain-text Bookshelf
extra_css: |
  <link href="/static/stylesheets/bookshelf.css" rel="stylesheet" type="text/css" media="all">
---
  <h1>plain-text bookshelf</h1>

  <div class="filter-section">
      <div class="filter-controls">
          <button class="filter-button active" data-filter="finished">Log</button>
          <button class="filter-button" data-filter="toread">Backlog</button>
      </div>
      <br>
  </div>

<table data-status="finished">
</table>

<table data-status="toread">
</table>
<script>
  (function(){

    function esc(s){
      if(!s && s!==0) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderTables(books){
      const tables = document.querySelectorAll('table[data-status]');
      tables.forEach(table => {
        const status = table.dataset.status;
        // build header
        const header = '<tr>\n    <th>Title</th>\n    <th>Author</th>\n    <th>Genre</th>\n    <th>Dates</th>\n </tr>';
        const rows = books.filter(b => b.status === status).map(b => {
          const authors = (b.authors || []).join(', ');
          const genre = (b.genre || []).join(', ');
          const dates = b.date_started + ' - ' + b.date_finished || '';
          return `<tr><td>${esc(b.title)}</td><td>${esc(authors)}</td><td>${esc(genre)}</td><td>${esc(dates)}</td></tr>`;
        }).join('\n');
        table.innerHTML = header + '\n' + rows + '\n';
      });
    }

    function setupFilters(){
      document.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          document.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          const filter = button.dataset.filter;
          document.querySelectorAll('table[data-status]').forEach(table => {
            table.style.display = (table.dataset.status === filter) ? 'table' : 'none';
          });
        });
      });
    }

    function initialDisplay(){
      document.querySelectorAll('table[data-status]').forEach(table => {
        table.style.display = (table.dataset.status === 'finished') ? 'table' : 'none';
      });
    }

    Promise.all([
      fetch('./books.json').then(r => r.json()),
      fetch('./books-to-be-read.json').then(r => r.json())
    ]).then(([booksData, listData]) => {
      const booksArray = Array.isArray(booksData) ? booksData : [];
      const listArray = Array.isArray(listData) ? listData : [];
      const books = [...booksArray, ...listArray];
      renderTables(books);
      setupFilters();
      initialDisplay();
    }).catch(err => {
      console.error('Failed to load books.json or books-to-be-read.json', err);
      setupFilters();
      initialDisplay();
    });
  })();
</script>

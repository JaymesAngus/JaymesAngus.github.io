<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>
    <link href="/static/minimalstyle.css" rel="stylesheet" type="text/css" media="all">
    <style>
      .filter-section {
          margin: 2rem 0;
          padding: 1rem;
          margin-bottom: 0;
      }

      .filter-controls {
          display: flex;
          gap: 1rem;
          flex-wrap: wrap;
          justify-content: left;
      }

      .filter-button {
          padding: 0.75rem 1.5rem;
          border: 1px solid #000;
          background: transparent;
          transition: all 0.3s ease;
          min-width: 120px;
          font-size: 1rem;
          font-family: inherit;
      }

      .filter-button:hover,
      .filter-button.active {
          background: #000;
          color: #fff;
      }

      .bookshelf {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 2rem;
          padding: 1rem;
      }

      .book {
          position: relative;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
          aspect-ratio: 2/3;
          width: 100%;
      }

      .book-cover {
          width: 100%;
          height: 100%;
          object-fit: cover;
          border: 1px solid #000;
      }

      .book-info {
          position: absolute;
          display: flex;
          bottom: 0px;
          left: 0px;
          width: 100%;
          height: 100%;
          padding: 5%;
          justify-content: center;
          align-items: center;
          text-align: center;
          opacity: 0;
          transition: opacity 0.3s ease;
          font-size: 0.9rem;
          background: rgba(255, 255, 255, 0.95);
      }

      @media (hover: hover) {
          .book:hover {
              transform: scale(1.05);
              z-index: 1;
          }

          .book:hover .progress-container,
          .book:hover .book-info {
              opacity: 1;
          }
      }

      .bookshelf.show-info .book-info {
          opacity: 1;
      }

      @media (hover: none) {
          .book:active {
              transform: scale(1.02);
          }

          .book.active .progress-container,
          .book.active .book-info {
              opacity: 1;
              background: rgba(255, 255, 255, 0.98);
          }
      }

      @media (max-width: 768px) {
          .bookshelf {
              gap: 1.5rem;
              padding: 0.5rem;
          }

          .filter-section {
              margin: 1rem 0;
              padding: 0.5rem;
          }

          .filter-controls {
              gap: 0.5rem;
              justify-content: center;
          }

          .filter-button {
              padding: 0.75rem 1rem;
              font-size: 0.9rem;
              min-width: 110px;
              width: calc(50% - 0.5rem);
              margin: 0.25rem;
          }
      }

      @media (max-width: 480px) {
        .bookshelf {
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        .book {
            margin-bottom: 40px;
        }
        .book-info {
            font-size: 0.8rem;
            padding: 0.25rem;
        }
        .filter-button {
            width: 100%;
            margin: 0.25rem 0;
        }
      }
    </style>
</head>
<body>
    <header>
      <img class="rotate" src="/static/images/MiscImages/tree.png" alt="A tree">
      <div class="title">
        <a href="/" style="color:#3a6506;"><span>biosferics</span></a>
      </div>
      <nav>
        <ul>
            <li><a class="navlink" href="/projects/">Projects</a></li>
            <li><a class="navlink" href="/wiki/">Wiki</a></li>
            <li><a class="navlink" href="/notes">Notes</a></li>
        </ul>
        <ul>
            <li><a aria-current="page" class="navlink" href="/bookshelf/">Bookshelf</a></li>
            <li><a class="navlink" href="/gallery/">Gallery</a></li>
            <li><a class="navlink" href="/about">About</a></li>
        </ul>
      </nav>
    </header>

  <div class="content">
    <h1 style="font-family: MajorMono; padding-left: 1rem;">bookshelf</h1>

    <div class="filter-section">
        <div class="filter-controls">
            <button class="filter-button active" data-filter="finished">Log</button>
            <button class="filter-button" data-filter="toread">Backlog</button>
        </div>
        <br>
    </div>

    <div class="bookshelf">
      <div class="loading">JavaScript not supported (there should be a grid of book covers here).</div>
    </div>
    <script>
      (function(){
        let books = [];

        function createBookElement(b, status) {
          const div = document.createElement('div');
          div.className = 'book';
          div.dataset.status = status;

          const img = document.createElement('img');
          img.className = 'book-cover';
          img.src = '/static/images/BookCovers/' + (b.cover || '');
          img.alt = b.title || '';
          img.loading = 'lazy';
          div.appendChild(img);

          const info = document.createElement('div');
          info.className = 'book-info';

          const authorList = joinNameList(b.authors)
          if (status === 'toread') {
            info.innerHTML = b.title || '';
          } else {
            info.innerHTML = b.title + '<br>-<br>Written by '+authorList+'<br>' + '<br>-<br>Finished on ' + b.date_finished;
          }
          div.appendChild(info);
          return div;
        }

        function joinNameList(items) {
          if (items.length === 0) return '';
          if (items.length === 1) return items[0];
          if (items.length === 2) return `${items[0]} and ${items[1]}`;
          return `${items.slice(0, -1).join(', ')}, and ${items.at(-1)}`;
        }

        function renderBooks(viewMode = 'finished') {
          const container = document.querySelector('.bookshelf');
          if (!container) return;

          container.innerHTML = '';

          if (viewMode === 'toread') {
            const toreadBooks = books.filter(b => b.status === 'toread');
            toreadBooks.forEach(b => {
              container.appendChild(createBookElement(b, 'toread'));
            });
          } else {
            const finishedBooks = books.filter(b => b.status === 'finished');
            finishedBooks.forEach(b => {
              container.appendChild(createBookElement(b, 'finished'));
            });
          }
          attachTouchHandlers();
        }

        function attachTouchHandlers(){
          if (window.matchMedia && window.matchMedia('(hover: none)').matches) {
            document.querySelectorAll('.book').forEach(book => {
              book.addEventListener('click', function(e){
                document.querySelectorAll('.book').forEach(b => { if (b !== this) b.classList.remove('active'); });
                this.classList.toggle('active');
              });
            });
            document.addEventListener('click', function(e){
              if (!e.target.closest || !e.target.closest('.book')) {
                document.querySelectorAll('.book').forEach(book => book.classList.remove('active'));
              }
            });
          }
        }

        function setupFilters() {
          document.querySelectorAll('.filter-button').forEach(button => {
            button.addEventListener('click', () => {
              document.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
              button.classList.add('active');
              const filter = button.dataset.filter;
              renderBooks(filter);
            });
          });
        }

        Promise.all([
          fetch('./books.json').then(r => r.json()),
          fetch('./reading-list.json').then(r => r.json())
        ]).then(([booksData, listData]) => {
          books = [...(booksData || []), ...(listData || [])];
          setupFilters();
          renderBooks('finished');
        })
      })();
    </script>
  </div>
  <footer>
    <p>© 2026 Jay Anderson</p>
  </footer>
</body>
</html>
